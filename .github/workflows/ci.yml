name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI deps (no GPU)
        working-directory: backend
        run: |
          uv pip install --system \
            pytest ruff \
            httpx "pydantic>=2" pillow \
            ebooklib beautifulsoup4 lxml

      - name: Ruff lint
        working-directory: backend
        run: python -m ruff check .

      - name: Unit tests (pure functions, no GPU)
        working-directory: backend
        run: python -m pytest tests/test_pure_functions.py -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
